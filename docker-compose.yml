services:
  postgres:
    image: postgres:16-alpine
    container_name: paternum_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - paternum_net

  redis:
    image: redis:7-alpine
    container_name: paternum_redis
    restart: unless-stopped
    networks:
      - paternum_net

  backend:
    build: ./backend
    container_name: paternum_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - paternum_net

  nginx:
    image: nginx:alpine
    container_name: paternum_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - paternum_net

volumes:
  postgres_data:
  uploads_data:

networks:
  paternum_net:
    driver: bridge